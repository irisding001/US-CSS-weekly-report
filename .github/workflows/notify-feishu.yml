name: Notify Feishu on Report Push

on:
  push:
    branches: [main]
    paths:
      - 'weekly_report_*.html'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Get changed report filename
        id: file
        run: |
          FILE=$(echo '${{ toJson(github.event.commits[0].added) }} ${{ toJson(github.event.commits[0].modified) }}' \
            | tr ' ' '\n' | grep -o 'weekly_report_[^"]*\.html' | head -1)
          echo "filename=$FILE" >> $GITHUB_OUTPUT
          echo "url=https://irisding001.github.io/US-CCS-weekly-report/$FILE" >> $GITHUB_OUTPUT

      - name: Get Feishu tenant_access_token
        id: token
        run: |
          TOKEN=$(curl -s -X POST https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal \
            -H "Content-Type: application/json" \
            -d '{"app_id":"cli_aa99822db9b8dbd6","app_secret":"${{ secrets.FEISHU_APP_SECRET }}"}' \
            | jq -r '.tenant_access_token')
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Send Feishu message
        run: |
          curl -s -X POST "https://open.feishu.cn/open-apis/im/v1/messages?receive_id_type=user_id" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ steps.token.outputs.token }}" \
            -d '{
              "receive_id": "irisding",
              "msg_type": "text",
              "content": "{\"text\":\"📊 US CCS Weekly Report 已更新\\n\\n点击查看：${{ steps.file.outputs.url }}\"}"
            }'
