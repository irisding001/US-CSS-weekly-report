<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US CCS Weekly Report - 历史周报</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f0f2f5; font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif; display: flex; justify-content: center; padding: 32px 16px; }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.10); width: 100%; max-width: 520px; overflow: hidden; }
  .card-header { background: linear-gradient(135deg, #1456F0 0%, #0E3FC0 100%); padding: 20px 24px 18px; }
  .card-header .title { font-size: 17px; font-weight: 700; color: #fff; }
  .card-header .subtitle { font-size: 12px; color: rgba(255,255,255,0.72); margin-top: 4px; }
  .list { padding: 8px 0; }
  .item { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; border-bottom: 1px solid #f3f3f3; text-decoration: none; color: inherit; transition: background 0.15s; }
  .item:last-child { border-bottom: none; }
  .item:hover { background: #f7f9ff; }
  .item .week { font-size: 13px; font-weight: 600; color: #222; }
  .item .range { font-size: 11px; color: #999; margin-top: 2px; }
  .item .arrow { color: #1456F0; font-size: 16px; }
  .empty { padding: 32px 24px; text-align: center; color: #bbb; font-size: 13px; }
</style>
</head>
<body>
<div class="card">
  <div class="card-header">
    <div class="title">US CCS Weekly Report</div>
    <div class="subtitle">历史周报列表</div>
  </div>
  <div class="list" id="list"></div>
</div>
<script>
const REPORTS = [
  { file: "weekly_report_2026-07-10.html", label: "Week 28", range: "2026-07-10 ~ 2026-07-16" },
  { file: "weekly_report_2026-06-26.html", label: "Week 26", range: "2026-06-26 ~ 2026-07-02" },
  { file: "weekly_report_2026-06-22.html", label: "Week 25", range: "2026-06-15 ~ 2026-06-21" },
  { file: "weekly_report_2026-06-15.html", label: "Week 24", range: "2026-06-08 ~ 2026-06-14" },
  { file: "weekly_report_2026-06-08.html", label: "Week 23", range: "2026-06-01 ~ 2026-06-07" },
  { file: "weekly_report_2026-06-01.html", label: "Week 22", range: "2026-05-25 ~ 2026-05-31" },
  { file: "weekly_report_2026-05-25.html", label: "Week 21", range: "2026-05-18 ~ 2026-05-24" },
];
const list = document.getElementById('list');
if (REPORTS.length === 0) {
  list.innerHTML = '<div class="empty">暂无历史周报</div>';
} else {
  REPORTS.forEach(r => {
    const a = document.createElement('a');
    a.className = 'item';
    a.href = r.file;
    a.innerHTML = `<div><div class="week">${r.label}</div><div class="range">${r.range}</div></div><div class="arrow">›</div>`;
    list.appendChild(a);
  });
}
</script>
</body>
</html>
